[default]
provider = "openai"

[providers.openai]
type = "openai"
api_base = "https://api.openai.com/v1"
api_key = "sk-YOUR-KEY"
model = "gpt-4o"

[providers.claude]
type = "claude"
api_base = "https://api.anthropic.com"
api_key = "sk-ant-YOUR-KEY"
model = "claude-sonnet-4-20250514"

[providers.deepseek]
type = "openai"
api_base = "https://api.deepseek.com/v1"
api_key = "YOUR-KEY"
model = "deepseek-chat"

[providers.kimi]
type = "openai"
api_base = "https://api.moonshot.cn/v1"
api_key = "YOUR-KEY"
model = "moonshot-v1-8k"

[providers.minimax]
type = "openai"
api_base = "https://api.minimax.chat/v1"
api_key = "YOUR-KEY"
model = "abab6.5s-chat"

[providers.local_vllm]
type = "openai"
api_base = "http://localhost:8000/v1"
api_key = "dummy"
model = "Qwen/Qwen2.5-72B-Instruct"

[arena]
max_laureates_per_room = 5
debate_max_rounds = 3
typing_delay_ms = 800

[wiki]
# Timeout for detecting stalled LLM connection (no data received), in seconds
heartbeat_timeout_s = 5
# Total timeout for LLM generation calls (ingest + generate), in seconds
generation_timeout_s = 600
# Max input context length sent to LLM (characters)
max_context_length = 20000

[data]
turingskill_path = "./turingskill"
duckdb_path = "./turingmind.duckdb"
